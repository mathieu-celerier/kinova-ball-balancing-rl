ball:
  radius: 0.0335
  mass: 0.0657
  friction: [1.0, 0.2, 0.0005]
  condim: 6
  solref: [0.02, 2.5]
  solimp: [0.95, 0.995, 0.001, 0.5, 2.0]
  rgba: [0.9, 0.2, 0.2, 1.0]

observation_history_length: 5

observation_noise:
  joint_pos: { min: -0.01, max: 0.01 }
  joint_vel: { min: -0.1, max: 0.1 }
  ee_pos: { min: -0.003, max: 0.003 }
  ee_quat: { min: -0.01, max: 0.01 }
  ee_vel: { min: -0.05, max: 0.05 }
  ee_ang_vel: { min: -0.1, max: 0.1 }
  ee_ft_wrench: { min: -0.1, max: 0.1 }

joint_action:
  scale: 0.13
  use_default_offset: true

cartesian_action:
  delta_pos_scale: 0.04
  damping: 0.05
  max_dq: 0.2
  position_weight: 1.0
  orientation_weight: 1.0
  posture_weight: 0.03

ball_reset:
  xy_range: [-0.02, 0.02]
  z_offset: 0.05
  x_offset: 0.0
  y_offset: 0.0
  linear_velocity:
    x: [-0.25, 0.25]
    y: [-0.25, 0.25]
    z: [-0.05, 0.05]
  angular_velocity: [-2.0, 2.0]

ball_kick:
  interval_s: [0.4, 1.0]
  linear_velocity:
    x: [-0.15, 0.15]
    y: [-0.15, 0.15]
    z: [-0.03, 0.03]
  angular_velocity: [-0.5, 0.5]
  add_to_current: true

randomization:
  null_space_joint_offset: [-1.0, 1.0]
  ball_mass_scale: [0.7, 1.3]
  pd_gain_scale: [0.95, 1.05]
  robot_body_mass_scale: [0.9, 1.1]
  robot_body_inertia_scale: [0.9, 1.1]
  robot_dof_armature_scale: [0.9, 1.1]

rewards:
  is_alive: 0.2
  ball_centering: 20.0
  ball_centering_std: 0.06
  ball_speed: -8.0
  ball_speed_lin_weight: 1.0
  ball_speed_ang_weight: 1.0
  ball_height_above_plate: -50.0
  ball_height_soft_threshold: 0.06
  ball_no_contact: -18.0
  ball_no_contact_dist: 0.0
  pre_contact_action_rate_l2: -1.0
  post_contact_action_rate_l2: -0.1
  pre_contact_action_acc_l2: -0.15
  post_contact_action_acc_l2: -0.02
  pre_contact_joint_vel_l2: -0.02
  post_contact_joint_vel_l2: -0.004
  joint_acc_l2: -0.001
  joint_torque_l2: -0.002
  joint_pos_limits: -5.0
  plate_drop_under_ball: -5.0
  plate_drop_ball_height_threshold: 0.01
  plate_drop_xy_radius: 0.12
  pre_contact_racquet_ang_vel_l2: -20.0
  post_contact_racquet_ang_vel_l2: -5.0
  pre_contact_racquet_lin_vel_l2: -80.0
  post_contact_racquet_lin_vel_l2: -20.0
  pre_contact_racquet_ori_dist_from_initial_l2: -200.0
  post_contact_racquet_ori_dist_from_initial_l2: -50.0
  pre_contact_racquet_dist_from_initial_l2: -800.0
  post_contact_racquet_dist_from_initial_l2: -120.0

terminations:
  max_xy_radius: 0.16
  min_height: -0.06
  floor_height: 0.05

simulation:
  num_envs: 1024
  env_spacing: 2.0
  timestep: 0.002
  iterations: 20
  ls_iterations: 20
  ccd_iterations: 40
  nconmax: 256
  njmax: 1024
  decimation: 5
  episode_length_s: 10.0
  play_episode_length_s: 1000000000
  viewer_distance: 0.9
  viewer_elevation: -35.0
  viewer_azimuth: 110.0

ppo:
  actor_hidden_dims: [64, 64]
  critic_hidden_dims: [64, 64]
  activation: elu
  init_noise_std: 1.0
  value_loss_coef: 1.0
  clip_param: 0.2
  entropy_coef: 0.003
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.0003
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  desired_kl: 0.01
  max_grad_norm: 1.0
  save_interval: 200
  num_steps_per_env: 24
  max_iterations: 10000
