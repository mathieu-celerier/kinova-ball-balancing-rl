ball:
  radius: 0.0335
  mass: 0.0657
  friction: [1.0, 0.2, 0.0005]
  condim: 6
  solref: [0.02, 2.5]
  solimp: [0.95, 0.995, 0.001, 0.5, 2.0]
  rgba: [0.9, 0.2, 0.2, 1.0]

observation_history_length: 5

observation_noise:
  joint_pos: { min: -0.01, max: 0.01 }
  joint_vel: { min: -0.1, max: 0.1 }
  ee_pos: { min: -0.003, max: 0.003 }
  ee_quat: { min: -0.01, max: 0.01 }
  ee_vel: { min: -0.05, max: 0.05 }
  ee_ang_vel: { min: -0.1, max: 0.1 }
  ee_ft_wrench: { min: -0.1, max: 0.1 }

joint_action:
  use_default_offset: true
  use_nullspace_torque: false
  stiffness: [40.0, 40.0, 40.0, 40.0, 15.0, 15.0, 15.0]
  damping: [15.0, 15.0, 15.0, 15.0, 8.5, 8.5, 8.5]
  nullspace_stiffness: [40.0, 40.0, 40.0, 40.0, 15.0, 15.0, 15.0]
  nullspace_damping: [15.0, 15.0, 15.0, 15.0, 8.5, 8.5, 8.5]
  damping_pinv: 0.001
  nullspace_resample_interval_s: [0.25, 1.0]

cartesian_action:
  delta_pos_scale: 0.2
  delta_ori_scale: 2.0
  damping_pos: 25.0
  damping_ori: 25.0
  damping_null: 10.0
  damping_pinv: 0.000001
  position_weight: 100.0
  orientation_weight: 100.0
  posture_weight: 20.0
  orientation_error_in_body_frame: false
  nullspace_resample_interval_s: [0.25, 1.0]

ball_reset:
  xy_range: [-0.02, 0.02]
  z_offset: 0.05
  x_offset: 0.0
  y_offset: 0.0
  release_delay_s: [0.0, 0.25]
  linear_velocity:
    x: [-0.25, 0.25]
    y: [-0.25, 0.25]
    z: [-0.05, 0.05]
  angular_velocity: [-2.0, 2.0]

ball_kick:
  interval_s: [0.4, 1.0]
  linear_velocity:
    x: [-0.15, 0.15]
    y: [-0.15, 0.15]
    z: [-0.03, 0.03]
  angular_velocity: [-0.5, 0.5]
  add_to_current: true

randomization:
  null_space_joint_offset: [-1.0, 1.0]
  null_space_curriculum_initial_scale: 0.05
  null_space_curriculum_start_steps: 25000
  null_space_curriculum_steps: 75000
  ball_mass_scale: [0.7, 1.3]
  ball_friction_scale: [0.8, 1.2]
  pd_gain_scale: [0.95, 1.05]
  robot_body_mass_scale: [0.9, 1.1]
  robot_body_inertia_scale: [0.9, 1.1]
  robot_dof_armature_scale: [0.9, 1.1]

rewards:
  is_alive: 1.0
  ball_no_contact: -50.0
  ball_no_contact_dist: 0.0
  ball_centering: 200.0
  ball_centering_std: 0.04
  ball_lin_vel_l2: 0.0
  ball_lin_vel_plate_l2: 0.0
  action_rate_l2: -1.0
  action_acc_l2: -0.15
  joint_vel_l2: -0.02
  joint_acc_l2: -0.001
  joint_torque_l2: -0.002
  joint_torque_rate_l2: 0.0
  joint_pos_limits: -5.0
  plate_drop_under_ball: -100.0
  plate_drop_ball_height_threshold: 0.01
  plate_drop_xy_radius: 0.12
  racquet_ang_vel_l2: -200.0
  racquet_lin_vel_l2: -100.0
  racquet_centering: 50.0
  racquet_centering_std: 0.05
  racquet_orientation_centering: 100.0
  racquet_orientation_centering_std: 0.2

terminations:
  max_xy_radius: 0.16
  min_height: -0.06
  floor_height: 0.05

simulation:
  num_envs: 1024
  env_spacing: 2.0
  timestep: 0.001
  iterations: 20
  ls_iterations: 20
  ccd_iterations: 40
  nconmax: 256
  njmax: 1024
  decimation: 10
  episode_length_s: 10.0
  play_episode_length_s: 1000000000
  viewer_distance: 0.9
  viewer_elevation: -35.0
  viewer_azimuth: 110.0

ppo:
  actor_hidden_dims: [256, 128, 64]
  critic_hidden_dims: [256, 128, 64]
  activation: elu
  init_noise_std: 1.0
  value_loss_coef: 1.0
  clip_param: 0.2
  entropy_coef: 0.003
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.0003
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  desired_kl: 0.01
  max_grad_norm: 1.0
  save_interval: 200
  num_steps_per_env: 25
  max_iterations: 30000

training:
  experiment_name_suffix: null
  wandb_project: null
  run_name: null
  upload_videos_to_wandb: true
  use_observation_noise: null
  use_joint_pos_observation: null
  enable_ball_kick_in_play: false
  randomize_ball_reset: null
  randomize_ball_properties: null
  randomize_pd_gains: null
  randomize_racquet_model: null
  randomize_robot_model: null
  randomize_null_space_init: null
  use_ball_kick: null
