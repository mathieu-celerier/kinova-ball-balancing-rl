# Easier nominal learning run with reduced disturbances.
ball_reset:
  linear_velocity:
    x: [-0.15, 0.15]
    y: [-0.15, 0.15]
    z: [-0.03, 0.03]
  angular_velocity: [-1.0, 1.0]

ball_kick:
  interval_s: [0.8, 1.4]
  linear_velocity:
    x: [-0.08, 0.08]
    y: [-0.08, 0.08]
    z: [-0.02, 0.02]
  angular_velocity: [-0.25, 0.25]

rewards:
  ball_centering: 45.0
  ball_speed: -6.0
  ball_no_contact: -12.0
  racquet_dist_from_initial_l2: -20.0

ppo:
  max_iterations: 3000
